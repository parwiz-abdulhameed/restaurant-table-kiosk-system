<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chef İstanbul | Admin Giriş</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.5s ease;
    /* fallback gradient, js ile değişecek */
    background: radial-gradient(circle at 10% 20%, #0b1120, #030712);
    position: relative;
  }
  #loginVideoBackground {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    opacity: 0.75;
  }
  .glass-card {
    background: rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
    animation: slideUp 0.6s ease-out;
    position: relative;
    z-index: 1;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .input-field {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 12px 16px;
    color: white;
    outline: none;
  }
  .input-field:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.2); }
  .login-btn {
    width: 100%;
    background: linear-gradient(105deg, #f97316, #ea580c);
    border: none;
    padding: 12px;
    border-radius: 40px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .login-btn:hover { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.6; transform: none; }
  .error-message { color: #f87171; font-size: 0.8rem; margin-top: 8px; text-align: center; }
  .logo-container {
    width: 72px;
    height: 72px;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    background: linear-gradient(135deg, #f97316, #ea580c);
    font-size: 2.5rem;
    font-weight: 800;
    color: white;
    box-shadow: 0 8px 24px rgba(249,115,22,0.3);
  }
  .logo-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 24px;
  }
</style>
</head>
<body>

<div class="glass-card">
  <div class="text-center mb-6">
    <div class="logo-container" id="loginLogo">C</div>
    <h2 class="text-2xl font-bold text-white" id="loginTitle">Chef İstanbul</h2>
    <p class="text-slate-400 text-sm mt-1">Yönetim Paneli Girişi</p>
  </div>
  <form id="loginForm">
    <input type="text" id="username" class="input-field mb-3" placeholder="Kullanıcı adı" autocomplete="username" required>
    <input type="password" id="password" class="input-field mb-4" placeholder="Şifre" autocomplete="current-password" required>
    <div id="errorMsg" class="error-message"></div>
    <button type="submit" id="loginBtn" class="login-btn mt-2">Giriş Yap</button>
    <div class="text-right mt-3"><a href="#" id="forgotLink" class="text-slate-400 text-sm hover:text-orange-500">Şifremi Unuttum</a></div>
  </form>
</div>

<script>
  // ---------- IndexedDB yardımcıları (admin ile aynı) ----------
  const DB_NAME = 'ChefIstanbulAdmin';
  const STORE_NAME = 'adminBg';
  let dbInstance = null;

  function openAdminBgDB() {
    return new Promise((resolve, reject) => {
      if (dbInstance) return resolve(dbInstance);
      const request = indexedDB.open(DB_NAME, 1);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        dbInstance = request.result;
        resolve(dbInstance);
      };
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        }
      };
    });
  }

  async function getAdminBgFromIndexedDB() {
    try {
      const db = await openAdminBgDB();
      return new Promise((resolve) => {
        const tx = db.transaction([STORE_NAME], 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const getRequest = store.get('bgMedia');
        getRequest.onsuccess = () => {
          const record = getRequest.result;
          if (record && record.data) {
            const blob = new Blob([record.data], { type: record.mime });
            const url = URL.createObjectURL(blob);
            resolve({ url, type: record.type, blob });
          } else {
            resolve(null);
          }
        };
        getRequest.onerror = () => resolve(null);
      });
    } catch (e) {
      console.warn('IndexedDB okuma hatası:', e);
      return null;
    }
  }

  // ---------- Login ayarlarını yükle ve uygula ----------
  async function loadLoginSettings() {
    try {
      // 1. Ayarları al
      const res = await fetch('/api/settings');
      const settings = await res.json();

      // Logo
      const logoContainer = document.getElementById('loginLogo');
      if (settings.admin_logo && settings.admin_logo.trim() !== '') {
        logoContainer.innerHTML = `<img src="${settings.admin_logo}" alt="Logo">`;
        logoContainer.style.background = 'transparent';
        logoContainer.style.boxShadow = 'none';
      } else {
        logoContainer.innerHTML = 'C';
        logoContainer.style.background = 'linear-gradient(135deg, #f97316, #ea580c)';
        logoContainer.style.boxShadow = '0 8px 24px rgba(249,115,22,0.3)';
      }

      // Başlık
      const titleEl = document.getElementById('loginTitle');
      if (settings.admin_title && settings.admin_title.trim() !== '') {
        titleEl.textContent = settings.admin_title;
      } else {
        titleEl.textContent = 'Chef İstanbul';
      }

      // Arka plan rengi
      const bgColor = settings.admin_bg_color || '#0b1120';
      document.body.style.backgroundColor = bgColor;

      // Arka plan medyası (IndexedDB)
      const media = await getAdminBgFromIndexedDB();
      if (media) {
        applyLoginMedia(media);
      } else {
        // fallback gradient
        document.body.style.background = 'radial-gradient(circle at 10% 20%, #0b1120, #030712)';
        document.body.style.backgroundImage = 'none';
      }
    } catch (e) {
      console.warn('Login ayarları yüklenemedi, varsayılan kullanılıyor:', e);
    }
  }

  function applyLoginMedia(media) {
    // Eski video varsa kaldır
    const oldVideo = document.getElementById('loginVideoBackground');
    if (oldVideo) oldVideo.remove();
    // Eski resim arka planını temizle
    document.body.style.backgroundImage = 'none';

    if (media.type === 'video') {
      const video = document.createElement('video');
      video.id = 'loginVideoBackground';
      video.autoplay = true;
      video.loop = true;
      video.muted = true;
      video.style.position = 'fixed';
      video.style.top = '0';
      video.style.left = '0';
      video.style.width = '100%';
      video.style.height = '100%';
      video.style.objectFit = 'cover';
      video.style.zIndex = '-1';
      video.style.opacity = '0.75';
      video.src = media.url;
      document.body.prepend(video);
      video.play().catch(e => console.warn('Video oynatılamadı:', e));
    } else if (media.type === 'image') {
      document.body.style.backgroundImage = `url('${media.url}')`;
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundPosition = 'center';
    }
  }

  // ---------- Form işlemleri (mevcut) ----------
  const form = document.getElementById('loginForm');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  const forgotLink = document.getElementById('forgotLink');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = usernameInput.value.trim();
    const password = passwordInput.value;
    if (!username || !password) {
      errorMsg.innerText = 'Kullanıcı adı ve şifre girin.';
      return;
    }
    loginBtn.disabled = true;
    loginBtn.innerText = 'Giriş yapılıyor...';
    errorMsg.innerText = '';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Giriş başarısız');
      localStorage.setItem('admin_token', data.token);
      window.location.href = '/admin';
    } catch (err) {
      errorMsg.innerText = err.message;
      loginBtn.disabled = false;
      loginBtn.innerText = 'Giriş Yap';
    }
  });

  forgotLink.addEventListener('click', (e) => {
    e.preventDefault();
    const email = prompt('Kayıtlı e-posta adresinizi girin:');
    if (email) {
      fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      }).then(() => alert('Şifre sıfırlama linki e-posta adresinize gönderildi. (Konsola bakın)'));
    }
  });

  // Sayfa yüklendiğinde ayarları al
  document.addEventListener('DOMContentLoaded', loadLoginSettings);
</script>
</body>
</html>
