<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Şifre Sıfırlama</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">
<div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-96">
  <h2 class="text-2xl font-bold text-white mb-4">Yeni Şifre Belirle</h2>
  <input type="password" id="newPass" class="w-full p-2 rounded-lg bg-gray-700 text-white mb-3" placeholder="Yeni şifre">
  <input type="password" id="confirmPass" class="w-full p-2 rounded-lg bg-gray-700 text-white mb-4" placeholder="Yeni şifre (tekrar)">
  <button id="resetBtn" class="w-full bg-orange-500 p-2 rounded-lg font-bold">Şifreyi Güncelle</button>
  <div id="msg" class="mt-3 text-sm text-center"></div>
</div>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const email = decodeURIComponent(urlParams.get('email') || '');
  const resetBtn = document.getElementById('resetBtn');
  const msgDiv = document.getElementById('msg');

  resetBtn.addEventListener('click', async () => {
    const newPassword = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;
    if (!newPassword) return msgDiv.innerText = 'Şifre girin.';
    if (newPassword !== confirm) return msgDiv.innerText = 'Şifreler eşleşmiyor.';
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, email, newPassword })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      msgDiv.innerHTML = '<span class="text-green-400">Şifre güncellendi! Yönlendiriliyorsunuz...</span>';
      setTimeout(() => window.location.href = '/login', 2000);
    } catch (err) {
      msgDiv.innerHTML = `<span class="text-red-400">Hata: ${err.message}</span>`;
    }
  });
</script>
</body>
</html>
